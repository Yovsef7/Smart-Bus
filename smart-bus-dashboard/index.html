<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>خريطة المراقبة الحية - Smart Bus AWS</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #2563eb;
      --primary-dark: #1d4ed8;
      --success-color: #10b981;
      --warning-color: #f59e0b;
      --danger-color: #ef4444;
      --dark-color: #1f2937;
      --light-color: #f8fafc;
      --border-color: #e5e7eb;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease-in-out;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f0f4f8 100%);
      color: var(--dark-color);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }

    @media (min-width: 768px) {
      .container {
        padding: 2rem;
      }
    }

    /* Header Styles */
    header {
      background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%);
      padding: 1.5rem;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
      border-bottom: 3px solid var(--primary-color);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    @media (min-width: 768px) {
      header {
        padding: 2rem;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        gap: 2rem;
      }
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--dark-color);
      margin-bottom: 0.25rem;
    }

    @media (min-width: 768px) {
      header h1 {
        font-size: 2rem;
      }
    }

    header p {
      font-size: 0.75rem;
      color: #6b7280;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Status Badge */
    #connection-status-badge {
      background: #f3f4f6;
      color: #6b7280;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    /* Cards Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 640px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .stat-card {
      background: white;
      padding: 1.25rem;
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      border-right: 3px solid var(--border-color);
      transition: var(--transition);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .stat-card.primary {
      border-right-color: var(--primary-color);
    }

    .stat-card.warning {
      border-right-color: var(--warning-color);
    }

    .stat-card.success {
      border-right-color: var(--success-color);
    }

    .stat-card.danger {
      border-right-color: var(--danger-color);
    }

    .stat-card__label {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-bottom: 0.5rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card__value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--dark-color);
    }

    .stat-card__large {
      font-size: 2rem;
    }

    .stat-card__unit {
      font-size: 0.875rem;
      margin-left: 0.25rem;
    }

    .stat-card__status {
      font-size: 0.875rem;
    }

    /* Main Panel */
    .main-panel {
      background: white;
      padding: 1.5rem;
      border-radius: 16px;
      box-shadow: var(--shadow-md);
    }

    @media (min-width: 768px) {
      .main-panel {
        padding: 2rem;
      }
    }

    /* Button Group */
    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    @media (min-width: 640px) {
      .button-group {
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
    }

    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 9999px;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }

    @media (min-width: 640px) {
      button {
        padding: 0.875rem 2rem;
        font-size: 0.9375rem;
      }
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Button Variants */
    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-dark);
      box-shadow: var(--shadow-md);
    }

    .btn-danger {
      background: var(--danger-color);
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background: #dc2626;
      box-shadow: var(--shadow-md);
    }

    .btn-dark {
      background: var(--dark-color);
      color: white;
    }

    .btn-dark:hover:not(:disabled) {
      background: #111827;
      box-shadow: var(--shadow-md);
    }

    .btn-success {
      background: var(--success-color);
      color: white;
    }

    .btn-success:hover:not(:disabled) {
      background: #059669;
      box-shadow: var(--shadow-md);
    }

    .btn-warning {
      background: var(--warning-color);
      color: white;
    }

    .btn-warning:hover:not(:disabled) {
      background: #d97706;
      box-shadow: var(--shadow-md);
    }

    .btn-indigo {
      background: #4f46e5;
      color: white;
    }

    .btn-indigo:hover:not(:disabled) {
      background: #4338ca;
      box-shadow: var(--shadow-md);
    }

    /* Status Message */
    #pickup-status {
      font-size: 0.875rem;
      text-align: center;
      margin-bottom: 1rem;
      min-height: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Map */
    #map {
      height: 400px;
      width: 100%;
      border-radius: 12px;
      z-index: 1;
      border: 1px solid var(--border-color);
      margin-bottom: 1.5rem;
    }

    @media (min-width: 768px) {
      #map {
        height: 540px;
      }
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color);
    }

    .legend__item {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 0.75rem;
      background: #f9fafb;
      border-radius: 8px;
    }

    .legend__icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 0.875rem;
    }

    .legend__active {
      background: #dbeafe;
      color: var(--primary-color);
    }

    .legend__inactive {
      background: #f3f4f6;
      color: #9ca3af;
    }

    .legend__emergency {
      background: #fee2e2;
      color: var(--danger-color);
    }

    /* Bus Icons */
    .bus-icon-active {
      font-size: 28px;
      color: var(--primary-color);
      text-shadow: 0 0 5px white;
    }

    .bus-icon-inactive {
      font-size: 28px;
      color: #9ca3af;
      text-shadow: 0 0 5px white;
    }

    .bus-icon-emergency {
      font-size: 30px;
      color: var(--danger-color);
      text-shadow: 0 0 5px white;
    }

    .passenger-icon {
      font-size: 26px;
      color: var(--warning-color);
      text-shadow: 0 0 5px white;
    }

    /* Animations */
    .pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Utility Classes */
    .flex-center {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .text-success {
      color: var(--success-color);
    }

    .text-danger {
      color: var(--danger-color);
    }

    .text-warning {
      color: var(--warning-color);
    }

    /* Mobile Adjustments */
    @media (max-width: 640px) {
      body {
        padding: 0;
      }

      .container {
        padding: 0.75rem;
      }

      header {
        padding: 1rem;
        border-radius: 12px;
      }

      header h1 {
        font-size: 1.25rem;
      }

      header p {
        font-size: 0.7rem;
      }

      .stat-card {
        padding: 1rem;
      }

      .stat-card__value {
        font-size: 1.125rem;
      }

      .stat-card__large {
        font-size: 1.75rem;
      }

      button {
        padding: 0.625rem 1rem;
        font-size: 0.8125rem;
      }

      .legend {
        gap: 0.5rem;
      }

      .legend__item {
        font-size: 0.75rem;
        padding: 0.375rem 0.5rem;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 0.5rem;
      }

      header {
        padding: 0.75rem;
        margin-bottom: 1rem;
      }

      header h1 {
        font-size: 1.125rem;
      }

      header p {
        font-size: 0.65rem;
      }

      .stats-grid {
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .stat-card {
        padding: 0.875rem;
      }

      .stat-card__label {
        font-size: 0.7rem;
      }

      .stat-card__value {
        font-size: 1rem;
      }

      .stat-card__large {
        font-size: 1.5rem;
      }

      .button-group {
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }

      button {
        padding: 0.5rem 0.875rem;
        font-size: 0.75rem;
      }

      .main-panel {
        padding: 1rem;
      }

      #map {
        height: 300px;
        margin-bottom: 1rem;
      }

      .legend {
        flex-direction: column;
        gap: 0.375rem;
      }

      .legend__item {
        width: 100%;
        justify-content: center;
        font-size: 0.7rem;
      }
    }
  </style>
</head>

<body>
    <!-- Header -->
    <header>
      <div>
        <h1>خريطة المراقبة الحية للأسطول</h1>
        <p>Raspberry Pi → AWS IoT → DynamoDB → Lambda API → Vercel</p>
      </div>
      <div>
        <span id="connection-status-badge">
          <i class="fa-solid fa-spinner fa-spin"></i>
          بانتظار الاتصال بـ AWS...
        </span>
      </div>
    </header>

    <!-- Statistics Cards -->
    <div class="stats-grid">
      <div class="stat-card primary">
        <div class="stat-card__label">الباص المحدد حالياً</div>
        <div class="stat-card__value" id="bus-code-val">بانتظار باص...</div>
      </div>

      <div class="stat-card warning">
        <div class="stat-card__label">حمولة الباص</div>
        <div class="stat-card__value stat-card__large">
          <span id="passengers-val">0</span>
          <span class="stat-card__unit">راكب</span>
        </div>
      </div>

      <div class="stat-card success">
        <div class="stat-card__label">آخر تحديث من الجهاز</div>
        <div class="stat-card__value" id="last-update">غير متصل</div>
      </div>

      <div class="stat-card danger">
        <div class="stat-card__label">حالة الطوارئ</div>
        <div class="stat-card__value stat-card__status text-success" id="emergency-val">طبيعي</div>
      </div>

      <div class="stat-card">
        <div class="stat-card__label">عدد الباصات</div>
        <div class="stat-card__value stat-card__large"><span id="fleet-count">0</span></div>
      </div>
    </div>

    <!-- Main Panel -->
    <div class="main-panel">
      <!-- Button Group -->
      <div class="button-group">
        <button
          id="request-btn"
          onclick="togglePickupRequest()"
          class="btn-primary"
          disabled
        >
          <i class="fa-solid fa-hand-wave"></i>
          حدد باصاً لطلب الركوب
        </button>

        <button
          id="track-btn"
          onclick="focusOnSelectedBus()"
          class="btn-dark"
        >
          <i class="fa-solid fa-crosshairs"></i>
          تتبع الباص المحدد
        </button>

        <button
          id="next-btn"
          onclick="cycleNextBus()"
          class="btn-indigo"
        >
          <i class="fa-solid fa-rotate"></i>
          الباص التالي
        </button>

        <button
          id="dist-btn"
          onclick="toggleDistanceLine()"
          class="btn-success"
          style="display: none;"
        >
          <i class="fa-solid fa-route"></i>
          كم يبعد هذا الباص عني؟
        </button>
      </div>

      <!-- Status Message -->
      <p id="pickup-status"></p>

      <!-- Map -->
      <div id="map"></div>

      <!-- Legend -->
      <div class="legend">
        <span class="legend__item">
          <span class="legend__icon legend__active">
            <i class="fa-solid fa-bus"></i>
          </span>
          نشط
        </span>
        <span class="legend__item">
          <span class="legend__icon legend__inactive">
            <i class="fa-solid fa-bus"></i>
          </span>
          متوقف
        </span>
        <span class="legend__item">
          <span class="legend__icon legend__emergency">
            <i class="fa-solid fa-triangle-exclamation"></i>
          </span>
          طوارئ
        </span>
      </div>
    </div>

  </div>

  <script>
    // ======================================================
    // AWS API Gateway
    // ======================================================
    const API_BASE = "https://wdahwudddj.execute-api.eu-north-1.amazonaws.com/prod";

    const BUSES_API = `${API_BASE}/buses`;
    const REQUEST_API = `${API_BASE}/request`;
    const REMOVE_REQUEST_API = `${API_BASE}/request/remove`;

    // ======================================================
    // Map Setup
    // ======================================================
    const DEFAULT_LAT = 30.8339;
    const DEFAULT_LNG = 28.9151;

    let map = L.map("map").setView([DEFAULT_LAT, DEFAULT_LNG], 14);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    function getBusIcon(bus) {
      let iconClass = "bus-icon-active";

      if (bus.emergency) {
        iconClass = "bus-icon-emergency";
      } else if (!bus.active) {
        iconClass = "bus-icon-inactive";
      }

      return L.divIcon({
        html: `<i class="fa-solid fa-bus ${iconClass}"></i>`,
        className: "custom-div-icon",
        iconSize: [35, 35],
        iconAnchor: [17, 17]
      });
    }

    const passengerIcon = L.divIcon({
      html: '<i class="fa-solid fa-person-walking passenger-icon"></i>',
      className: "custom-div-icon",
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });

    // ======================================================
    // State
    // ======================================================
    let fleet = {};
    let busMarkers = {};
    let selectedBusId = null;

    let passengerMarker = null;
    let distanceLine = null;

    let userLocation = null;
    let showLine = false;
    let isRequested = false;
    let myPassengerId = null;
    let myTargetBusId = null;

    // ======================================================
    // Helpers
    // ======================================================
    function normalizeBusData(data) {
      const busNumber = data.bus_id ?? 1;
      const busCode = data.bus_code || `BUS-${String(busNumber).padStart(2, "0")}`;

      const lat = Number(data.lat ?? data.latitude);
      const lng = Number(data.lng ?? data.longitude);

      const passengers = Number(data.passengers ?? data.occupancy ?? 0);
      const maxCapacity = Number(data.max_capacity ?? 30);

      return {
        bus_id: busCode,
        raw_bus_id: busNumber,
        lat,
        lng,
        passengers,
        max_capacity: maxCapacity,
        active: data.active === true,
        timestamp: data.timestamp ?? null,
        emergency: data.emergency === true,
        eta: data.eta ?? null,
        action: data.action ?? "",
        source: data.source ?? ""
      };
    }

    function setStatusConnected() {
      const badge = document.getElementById("connection-status-badge");
      badge.innerHTML = '<i class="fa-solid fa-circle text-[8px] ml-1"></i> متصل بـ AWS';
      badge.className = "bg-green-100 text-green-700 px-4 py-2 rounded-full text-xs font-bold pulse";
    }

    function setStatusError(message) {
      const badge = document.getElementById("connection-status-badge");
      badge.innerHTML = `<i class="fa-solid fa-triangle-exclamation ml-1"></i> ${message}`;
      badge.className = "bg-red-100 text-red-700 px-4 py-2 rounded-full text-xs font-bold";
    }

    function formatTimestamp(timestamp) {
      if (!timestamp) return new Date().toLocaleTimeString("ar-EG");

      const t = Number(timestamp);
      const ms = t < 1000000000000 ? t * 1000 : t;

      return new Date(ms).toLocaleString("ar-EG");
    }

    function isValidLocation(lat, lng) {
      return !isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0;
    }

    function getFleetArray() {
      return Object.values(fleet);
    }

    // ======================================================
    // Session
    // ======================================================
    function loadSession() {
      const savedId = localStorage.getItem("bus_passenger_id");
      const targetBus = localStorage.getItem("bus_target_bus_id");

      if (savedId && targetBus) {
        myPassengerId = savedId;
        myTargetBusId = targetBus;

        const lat = parseFloat(localStorage.getItem("bus_user_lat"));
        const lng = parseFloat(localStorage.getItem("bus_user_lng"));

        if (!isNaN(lat) && !isNaN(lng)) {
          userLocation = L.latLng(lat, lng);
          drawPassengerMarker(userLocation);
        }

        isRequested = true;
        updateRequestButtonUI(true);
      }
    }

    function saveSession() {
      localStorage.setItem("bus_passenger_id", myPassengerId);
      localStorage.setItem("bus_user_lat", userLocation.lat);
      localStorage.setItem("bus_user_lng", userLocation.lng);
      localStorage.setItem("bus_target_bus_id", myTargetBusId);
    }

    function clearSessionUI() {
      localStorage.removeItem("bus_passenger_id");
      localStorage.removeItem("bus_user_lat");
      localStorage.removeItem("bus_user_lng");
      localStorage.removeItem("bus_target_bus_id");

      isRequested = false;
      userLocation = null;
      myPassengerId = null;
      myTargetBusId = null;

      if (passengerMarker) {
        map.removeLayer(passengerMarker);
        passengerMarker = null;
      }

      if (distanceLine) {
        map.removeLayer(distanceLine);
        distanceLine = null;
      }

      showLine = false;
      document.getElementById("dist-btn").classList.add("hidden");
      updateRequestButtonUI(false);
    }

    // ======================================================
    // UI Updates
    // ======================================================
    function updateRequestButtonUI(requested) {
      const reqBtn = document.getElementById("request-btn");

      if (requested) {
        reqBtn.innerHTML = '<i class="fa-solid fa-xmark mr-2"></i> إلغاء طلبي';
        reqBtn.className = "bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-full shadow-md transition";
        reqBtn.disabled = false;
        document.getElementById("dist-btn").classList.remove("hidden");
        return;
      }

      reqBtn.innerHTML = '<i class="fa-solid fa-hand-wave mr-2"></i> أنا هنا! أريد ركوب هذا الباص';
      reqBtn.className = "bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-md transition";

      if (selectedBusId && fleet[selectedBusId] && fleet[selectedBusId].active) {
        reqBtn.disabled = false;
        reqBtn.classList.remove("opacity-50", "cursor-not-allowed");
      } else {
        reqBtn.disabled = true;
        reqBtn.classList.add("opacity-50", "cursor-not-allowed");
        reqBtn.innerHTML = '<i class="fa-solid fa-hand-wave mr-2"></i> حدد باصاً نشطاً لطلب الركوب';
      }
    }

    function updateCards(bus) {
      document.getElementById("bus-code-val").innerText = bus.bus_id;
      document.getElementById("passengers-val").innerText = bus.passengers;
      document.getElementById("last-update").innerText = formatTimestamp(bus.timestamp);

      const emergencyEl = document.getElementById("emergency-val");

      if (bus.emergency) {
        emergencyEl.innerText = "طوارئ نشطة";
        emergencyEl.className = "text-sm font-bold text-red-600 pulse";
      } else if (!bus.active) {
        emergencyEl.innerText = "الباص متوقف";
        emergencyEl.className = "text-sm font-bold text-gray-500";
      } else {
        emergencyEl.innerText = "طبيعي";
        emergencyEl.className = "text-sm font-bold text-green-600";
      }
    }

    function drawBus(bus) {
      if (!isValidLocation(bus.lat, bus.lng)) {
        console.log("Invalid location:", bus);
        return;
      }

      fleet[bus.bus_id] = bus;

      if (!busMarkers[bus.bus_id]) {
        busMarkers[bus.bus_id] = L.marker([bus.lat, bus.lng], {
          icon: getBusIcon(bus),
          zIndexOffset: 1000
        }).addTo(map);

        busMarkers[bus.bus_id].on("click", () => {
          selectedBusId = bus.bus_id;
          updateCards(bus);
          updateRequestButtonUI(isRequested);
          busMarkers[bus.bus_id].openPopup();
        });
      } else {
        busMarkers[bus.bus_id].setLatLng([bus.lat, bus.lng]);
        busMarkers[bus.bus_id].setIcon(getBusIcon(bus));
      }

      busMarkers[bus.bus_id].bindPopup(`
        <div style="text-align:right">
          <b>باص ${bus.bus_id}</b><br>
          الركاب: ${bus.passengers}/${bus.max_capacity}<br>
          الحالة: ${bus.active ? "نشط" : "متوقف"}<br>
          ${bus.emergency ? "🚨 طوارئ" : "✅ طبيعي"}<br>
          <small>${bus.source || ""}</small>
        </div>
      `);

      if (!selectedBusId) {
        selectedBusId = bus.bus_id;
        updateCards(bus);
        map.flyTo([bus.lat, bus.lng], 15);
      }

      if (selectedBusId === bus.bus_id) {
        updateCards(bus);
      }
    }

    function drawPassengerMarker(latlng) {
      if (!latlng) return;

      if (!passengerMarker) {
        passengerMarker = L.marker([latlng.lat, latlng.lng], {
          icon: passengerIcon
        }).addTo(map);
      } else {
        passengerMarker.setLatLng([latlng.lat, latlng.lng]);
      }

      passengerMarker.bindPopup("<b>موقعك الحالي</b><br>طلب ركوب نشط");
    }

    // ======================================================
    // AWS Load Multi-Buses
    // ======================================================
    async function loadBusFromAWS() {
      try {
        const res = await fetch(BUSES_API);

        if (!res.ok) {
          throw new Error(`API Error: ${res.status}`);
        }

        const data = await res.json();
        console.log("AWS BUSES DATA:", data);

        const buses = data.items || [];
        document.getElementById("fleet-count").innerText = buses.length;

        if (buses.length === 0) {
          setStatusError("لا توجد باصات");
          return;
        }

        buses.forEach(rawBus => {
          const bus = normalizeBusData(rawBus);

          if (isValidLocation(bus.lat, bus.lng)) {
            drawBus(bus);
          }
        });

        setStatusConnected();

        if (showLine) {
          updateDistanceUI();
        }

      } catch (err) {
        console.log("AWS API Error:", err);
        setStatusError("خطأ في الاتصال بـ AWS");
      }
    }

    // ======================================================
    // Actions
    // ======================================================
    function focusOnSelectedBus() {
      if (!selectedBusId || !fleet[selectedBusId]) {
        alert("لا يوجد باص محدد حالياً.");
        return;
      }

      const bus = fleet[selectedBusId];

      if (!isValidLocation(bus.lat, bus.lng)) {
        alert("موقع الباص غير متاح حالياً.");
        return;
      }

      map.flyTo([bus.lat, bus.lng], 16, {
        animate: true,
        duration: 1.0
      });

      if (busMarkers[selectedBusId]) {
        busMarkers[selectedBusId].openPopup();
      }
    }

    function cycleNextBus() {
      const buses = getFleetArray().filter(bus => isValidLocation(bus.lat, bus.lng));

      if (buses.length === 0) {
        alert("لا توجد باصات متاحة.");
        return;
      }

      const ids = buses.map(bus => bus.bus_id);
      const currentIndex = ids.indexOf(selectedBusId);
      const nextIndex = (currentIndex + 1) % ids.length;

      selectedBusId = ids[nextIndex];

      updateCards(fleet[selectedBusId]);
      updateRequestButtonUI(isRequested);
      focusOnSelectedBus();
    }

    async function togglePickupRequest() {
      const statusLabel = document.getElementById("pickup-status");

      if (isRequested) {
        try {
          if (myPassengerId && myTargetBusId) {
            await fetch(REMOVE_REQUEST_API, {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                bus_id: myTargetBusId,
                request_id: myPassengerId
              })
            });
          }
        } catch (err) {
          console.log("Remove request error:", err);
        }

        clearSessionUI();

        statusLabel.innerText = "تم إلغاء طلب الركوب وإخفاء موقعك.";
        statusLabel.className = "text-xs text-gray-500 font-bold text-center mb-2";

        setTimeout(() => {
          if (!isRequested) statusLabel.innerText = "";
        }, 3000);

        return;
      }

      if (!selectedBusId || !fleet[selectedBusId] || !fleet[selectedBusId].active) {
        alert("يرجى اختيار باص نشط أولاً لطلب ركوبه.");
        return;
      }

      statusLabel.innerText = "جاري تحديد موقعك...";
      statusLabel.className = "text-xs text-blue-500 mt-2 font-bold pulse text-center";

      if (!navigator.geolocation) {
        alert("متصفحك لا يدعم تحديد الموقع.");
        statusLabel.innerText = "";
        return;
      }

      navigator.geolocation.getCurrentPosition(async (position) => {
        userLocation = L.latLng(position.coords.latitude, position.coords.longitude);

        drawPassengerMarker(userLocation);

        map.flyTo([userLocation.lat, userLocation.lng], 17, {
          animate: true,
          duration: 1.5
        });

        const timeStr = new Date().toLocaleTimeString("ar-EG");
        myTargetBusId = selectedBusId;
        myPassengerId = `${Date.now()}_${Math.round(userLocation.lat * 100000)}`;

        const requestPayload = {
          bus_id: myTargetBusId,
          request_id: myPassengerId,
          lat: userLocation.lat,
          lng: userLocation.lng,
          time: timeStr,
          status: "waiting"
        };

        try {
          const res = await fetch(REQUEST_API, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(requestPayload)
          });

          if (!res.ok) {
            throw new Error(`Request API Error: ${res.status}`);
          }

          statusLabel.innerText = `✅ تم إرسال موقعك لباص (${myTargetBusId})!`;
          statusLabel.className = "text-xs text-green-600 font-bold text-center mb-2";

        } catch (err) {
          console.log("Request API error:", err);
          statusLabel.innerText = "⚠️ حدث خطأ أثناء إرسال الطلب.";
          statusLabel.className = "text-xs text-red-600 font-bold text-center mb-2";
        }

        isRequested = true;
        saveSession();
        updateRequestButtonUI(true);

        setTimeout(() => {
          statusLabel.innerText = "";
        }, 5000);

      }, () => {
        alert("يرجى تفعيل GPS لإرسال طلب الركوب.");
        statusLabel.innerText = "";
      });
    }

    function toggleDistanceLine() {
      if (!userLocation) {
        alert("لا يوجد موقع راكب. اضغط طلب ركوب أولاً.");
        return;
      }

      if (!selectedBusId || !fleet[selectedBusId]) {
        alert("لا يوجد باص محدد.");
        return;
      }

      showLine = !showLine;

      const btn = document.getElementById("dist-btn");

      if (showLine) {
        updateDistanceUI();
        btn.innerHTML = '<i class="fa-solid fa-eye-slash mr-2"></i> إخفاء الخط';
        btn.className = "bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-full shadow-md transition";
      } else {
        if (distanceLine) {
          map.removeLayer(distanceLine);
          distanceLine = null;
        }

        btn.innerHTML = '<i class="fa-solid fa-route mr-2"></i> كم يبعد هذا الباص عني؟';
        btn.className = "bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full shadow-md transition";
      }
    }

    function updateDistanceUI() {
      if (!showLine || !userLocation || !selectedBusId || !fleet[selectedBusId]) return;

      const bus = fleet[selectedBusId];
      const busLatLng = L.latLng(bus.lat, bus.lng);

      const distance = userLocation.distanceTo(busLatLng);
      const km = (distance / 1000).toFixed(2);

      const speedMetersPerMin = 333;
      const timeMins = Math.max(1, Math.round(distance / speedMetersPerMin));

      if (distanceLine) {
        map.removeLayer(distanceLine);
      }

      distanceLine = L.polyline([userLocation, busLatLng], {
        color: "#2563eb",
        weight: 4,
        opacity: 0.8,
        dashArray: "10, 10",
        lineJoin: "round"
      }).addTo(map);

      distanceLine.bindTooltip(`
        <div class="text-center border-r-4 border-blue-500 pr-2">
          <div class="text-gray-500 text-[10px]">المسافة عن الباص ${selectedBusId}:</div>
          <b class="text-blue-600">${km} كم</b><br>
          <span class="text-gray-500 text-[10px]">يصل خلال:</span>
          <b class="text-green-600">~${timeMins} دقيقة</b>
        </div>
      `, {
        permanent: true,
        direction: "center",
        className: "bg-white p-2 rounded-lg shadow-lg text-xs"
      }).openTooltip();
    }

    // ======================================================
    // Start
    // ======================================================
    loadSession();
    loadBusFromAWS();
    setInterval(loadBusFromAWS, 3000);
  </script>

</body>
</html>
